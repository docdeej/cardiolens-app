<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CardioLens — ECG Platform</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;font-family:'DM Sans',sans-serif;background:#F0F4F8;color:#1a2b3c}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#c2cfe0;border-radius:4px}
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:214px;flex-shrink:0;background:#0d1f35;display:flex;flex-direction:column}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;background:#fff;border-bottom:1px solid #dde5ef;display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;box-shadow:0 1px 3px rgba(13,31,53,0.06)}
.body{flex:1;overflow-y:auto;padding:20px}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;gap:10px}
.sb-icon{width:32px;height:32px;background:#c0392b;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.sb-title{font-family:'Fraunces',serif;font-size:16px;font-weight:700;color:#fff}
.sb-sub{font-family:'DM Mono',monospace;font-size:8px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.1em}
.sb-nav{padding:10px 8px;flex:1;overflow-y:auto}
.sb-grp{font-family:'DM Mono',monospace;font-size:8px;color:rgba(255,255,255,0.28);text-transform:uppercase;letter-spacing:0.12em;padding:10px 8px 3px}
.sb-btn{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:6px;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;color:rgba(255,255,255,0.5);font-family:'DM Sans',sans-serif;font-size:13px;transition:all 0.14s}
.sb-btn:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.85)}
.sb-btn.active{background:rgba(192,57,43,0.22);color:#fff;font-weight:500}
.sb-foot{padding:12px 14px;border-top:1px solid rgba(255,255,255,0.06)}
.ldot{width:7px;height:7px;border-radius:50%;background:#27ae60;animation:lp 2.5s infinite;flex-shrink:0}
.ldot.off{background:#e74c3c;animation:none}
@keyframes lp{0%,100%{box-shadow:0 0 0 0 rgba(39,174,96,0.4)}60%{box-shadow:0 0 0 6px rgba(39,174,96,0)}}
.card{background:#fff;border:1px solid #dde5ef;border-radius:11px;box-shadow:0 1px 3px rgba(13,31,53,0.07),0 4px 12px rgba(13,31,53,0.05);margin-bottom:14px}
.ch{padding:16px 18px 0}.cb{padding:14px 18px 18px}
.ct{font-family:'Fraunces',serif;font-size:15px;font-weight:500}
.cs{font-family:'DM Mono',monospace;font-size:11px;color:#7a95a8;margin-top:2px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.14s;border:none}
.btn-n{background:#0d1f35;color:#fff}.btn-n:hover{background:#162d4a}
.btn-n:disabled{background:#c2cfe0;color:#7a95a8;cursor:not-allowed}
.btn-r{background:#c0392b;color:#fff}.btn-r:hover{background:#e74c3c}
.btn-g{background:#1a7a4a;color:#fff}.btn-g:hover{background:#1e9459}
.btn-o{background:transparent;color:#0d1f35;border:1.5px solid #c2cfe0}.btn-o:hover{border-color:#0d1f35}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:6px}
.btn-xs{padding:4px 9px;font-size:11px;border-radius:5px}
.lbl{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;color:#4a6277;text-transform:uppercase;letter-spacing:0.07em;display:block;margin-bottom:4px}
.inp{width:100%;padding:7px 10px;border:1.5px solid #dde5ef;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px;color:#1a2b3c;background:#fff;transition:border-color 0.14s}
.inp:focus{outline:none;border-color:#0d1f35}
textarea.inp{resize:vertical;min-height:64px}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:600;font-family:'DM Mono',monospace;text-transform:uppercase}
.bg{background:#e6f7ef;color:#1a7a4a}.br{background:#fdecea;color:#c0392b}
.ba{background:#fef3e2;color:#d4820a}.bb{background:#e8f0fb;color:#1a5fa8}.bn{background:#e8edf3;color:#1a3350}
.uzone{border:2px dashed #c2cfe0;border-radius:10px;cursor:pointer;background:#f7f9fc;text-align:center;padding:28px 20px;transition:all 0.18s}
.uzone:hover{border-color:#0d1f35;background:#eef3fb}
.uzone.filled{border-style:solid;border-color:#0d1f35;background:#fff;padding:12px;cursor:default}
.rb{border-left:3px solid #dde5ef;padding:9px 13px;margin-bottom:8px;border-radius:0 7px 7px 0;background:#f7f9fc}
.rb-blue{border-color:#0d1f35;background:#eef3fb}.rb-amber{border-color:#d4820a;background:#fef9ec}
.rb-red{border-color:#c0392b;background:#fef7f6}.rb-green{border-color:#1a7a4a;background:#eaf6ef}
.rlbl{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:0.08em;color:#7a95a8;margin-bottom:3px}
.rtxt{font-size:13px;color:#1a2b3c;line-height:1.7}
.alert-box{border-radius:9px;padding:12px 16px;display:flex;gap:12px;margin-bottom:12px}
.alert-crit{background:#fdecea;border:1.5px solid #c0392b}
.alert-ok{background:#eaf6ef;border:1.5px solid #1a7a4a}
.alert-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0}
.tab-bar{display:flex;border-bottom:2px solid #dde5ef;margin-bottom:14px;flex-wrap:wrap}
.tab{padding:8px 16px;font-size:13px;font-weight:500;color:#7a95a8;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.14s}
.tab:hover{color:#1a2b3c}.tab.active{color:#0d1f35;border-bottom-color:#0d1f35;font-weight:600}
.page-title{font-family:'Fraunces',serif;font-size:22px;font-weight:500;color:#1a2b3c;margin-bottom:4px}
.page-sub{font-size:13px;color:#4a6277;margin-bottom:18px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fu{animation:fadeUp 0.28s ease forwards}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.75s linear infinite}
.spinner-dark{display:inline-block;width:13px;height:13px;border:2px solid rgba(13,31,53,0.2);border-top-color:#0d1f35;border-radius:50%;animation:spin 0.75s linear infinite}
.grid-2{display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.progress-bar{height:6px;background:#eef2f7;border-radius:3px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;background:#0d1f35;border-radius:3px;transition:width 0.5s ease}
.case-card{background:#fff;border:1px solid #dde5ef;border-radius:9px;padding:14px;cursor:pointer;transition:all 0.14s}
.case-card:hover{border-color:#0d1f35;box-shadow:0 2px 8px rgba(13,31,53,0.1)}
.case-card.selected{border-color:#0d1f35;background:#f4f7fc}
.stat-box{background:#fff;border:1px solid #dde5ef;border-radius:9px;padding:14px;text-align:center}
.stat-num{font-family:'Fraunces',serif;font-size:32px;font-weight:300;color:#0d1f35;line-height:1}
.stat-lbl{font-family:'DM Mono',monospace;font-size:9px;color:#7a95a8;text-transform:uppercase;letter-spacing:0.08em;margin-top:4px}
.diag-step{display:flex;align-items:center;gap:0}
.step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;flex-shrink:0;transition:all 0.25s}
.step-done{background:#0d1f35;color:#fff}
.step-active{background:#c0392b;color:#fff;box-shadow:0 0 0 4px rgba(192,57,43,0.16)}
.step-pending{background:#eef2f7;color:#7a95a8;border:1.5px solid #dde5ef}
.step-line{flex:1;height:2px;background:#dde5ef;margin:0 4px;transition:background 0.25s}
.step-done-line{background:#0d1f35}
.lead-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px}
.lead-cell{background:#f7f9fc;border:1px solid #dde5ef;border-radius:5px;padding:8px 10px}
.lead-name{font-family:'DM Mono',monospace;font-size:9px;color:#7a95a8;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px}
.lead-val{font-size:12px;color:#1a2b3c;line-height:1.5}
.verify-bar{background:#fff8ec;border:1.5px solid #d4820a;border-radius:9px;padding:12px 16px;display:flex;gap:12px;align-items:center;margin-top:10px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

const BACKEND = "https://web-production-78de3.up.railway.app";

const api = async (path, opts={}) => {
  const res = await fetch(BACKEND + path, opts);
  if (!res.ok) { const e = await res.json().catch(()=>({detail:res.statusText})); throw new Error(e.detail||`Error ${res.status}`); }
  return res.json();
};

const confStr = c => typeof c === "object" ? (c?.overall || "MEDIUM") : (c || "MEDIUM");

const CATEGORIES = ["Rhythm disorders","Ischaemia & ACS","Conduction","Hypertrophy & Structural","Emergency patterns","Normal","Other"];
const DIFFICULTY = ["Easy","Medium","Hard","Expert"];

const LABELS = {
  step1_emergency:"⚡ Emergency Screen",
  rate:"Rate",
  rhythm:"Rhythm",
  p_waves:"P Waves",
  pr_interval:"PR Interval",
  qrs_complex:"QRS Complex",
  st_t_waves:"ST & T Waves",
  qt_interval:"QT / QTc",
  axis:"Electrical Axis",
  stemi_territory:"STEMI Territory",
  stemi_equivalents:"STEMI Equivalents",
  reciprocal_changes:"Reciprocal Changes",
  conduction:"Conduction",
  ectopy:"Ectopy",
  other_findings:"Other Findings"
};

// Order to display findings sections
const FINDING_ORDER = [
  "step1_emergency","rate","rhythm","p_waves","pr_interval","qrs_complex",
  "st_t_waves","qt_interval","axis","stemi_territory","stemi_equivalents",
  "reciprocal_changes","conduction","ectopy","other_findings"
];

// Style each section appropriately
const sectionStyle = (k, v) => {
  if (k === "step1_emergency" && v && v !== "CLEAR") return "rb rb-red";
  if (k === "step1_emergency") return "rb rb-green";
  if (k === "stemi_territory" && v && v !== "None" && v !== "Unable to assess") return "rb rb-red";
  if (k === "stemi_equivalents" && v && v !== "None") return "rb rb-red";
  if (k === "reciprocal_changes" && v && v !== "None") return "rb rb-amber";
  if (k === "conduction" && v && v !== "Normal") return "rb rb-amber";
  if (k === "ectopy" && v && v !== "None") return "rb rb-amber";
  return "rb";
};

// ─── Shared Upload Zone ────────────────────────────────────────
function UploadZone({ imgSrc, onFile, onClear, label="Upload ECG image" }) {
  const ref = React.useRef(null);
  return (
    <div className={`uzone ${imgSrc?"filled":""}`} onClick={()=>!imgSrc&&ref.current?.click()}>
      <input ref={ref} type="file" accept="image/*" style={{display:"none"}}
        onChange={e=>{ const f=e.target.files?.[0]; if(f) onFile(f); }} />
      {imgSrc ? (
        <div>
          <img src={imgSrc} alt="ECG" style={{width:"100%",maxHeight:280,objectFit:"contain",borderRadius:7,border:"1px solid #dde5ef"}} />
          <button className="btn btn-o btn-xs" style={{marginTop:8}} onClick={e=>{e.stopPropagation();onClear();}}>Replace image</button>
        </div>
      ) : (
        <div>
          <div style={{fontSize:32,marginBottom:8}}>📋</div>
          <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>{label}</div>
          <div style={{fontSize:12,color:"#7a95a8",lineHeight:1.6}}>Click to browse · JPG or PNG<br/>Works with phone photos of paper ECGs</div>
        </div>
      )}
    </div>
  );
}

// ─── Helper: flatten nested object to readable string ──────────
function flattenVal(v) {
  if (v === null || v === undefined || v === "null" || v === "none" || v === "None") return null;
  if (Array.isArray(v)) {
    const filtered = v.filter(x => x && x !== "null" && x !== "none");
    return filtered.length ? filtered.join(" · ") : null;
  }
  if (typeof v === "object") {
    // Render object as labelled rows
    return Object.entries(v)
      .filter(([,val]) => val !== null && val !== undefined && val !== "null" && val !== "none" && val !== false)
      .map(([k,val]) => `${k.replace(/_/g," ")}: ${typeof val === "object" ? JSON.stringify(val) : String(val)}`)
      .join(" | ");
  }
  return String(v);
}

// ─── Findings Display ──────────────────────────────────────────
function FindingsPanel({ findings, confidence, imageQuality }) {
  const f = findings || {};
  const isCrit = f.critical_alert && f.critical_alert !== "null" && f.critical_alert !== "none" && f.critical_alert !== null;

  // Sections to render in clinical order with their styles
  const sections = [
    { key:"step1_emergency", label:"⚡ Emergency Screen", style: v => v && !v.startsWith("CLEAR") ? "rb rb-red" : "rb rb-green" },
    { key:"rate", label:"Rate", style: () => "rb" },
    { key:"rhythm", label:"Rhythm", style: () => "rb" },
    { key:"p_waves", label:"P Waves", style: () => "rb" },
    { key:"pr_interval", label:"PR Interval", style: v => {
      const d = typeof v === "object" ? v : {};
      return d.av_block && d.av_block !== "none" ? "rb rb-amber" : "rb";
    }},
    { key:"qrs_complex", label:"QRS Complex", style: v => {
      const d = typeof v === "object" ? v : {};
      return d.morphology && d.morphology !== "normal" ? "rb rb-amber" : "rb";
    }},
    { key:"j_point", label:"J Point", style: v => v && !v.startsWith("isoelectric") ? "rb rb-red" : "rb" },
    { key:"st_segment", label:"ST Segment", style: v => {
      const d = typeof v === "object" ? v : {};
      return d.elevation && d.elevation !== "none" ? "rb rb-red" : d.depression && d.depression !== "none" ? "rb rb-amber" : "rb";
    }},
    { key:"t_waves", label:"T Waves", style: v => {
      const d = typeof v === "object" ? v : {};
      return d.hyperacute_present ? "rb rb-red" : d.inversions && d.inversions !== "none" ? "rb rb-amber" : "rb";
    }},
    { key:"qt_interval", label:"QT / QTc", style: v => {
      const d = typeof v === "object" ? v : {};
      return d.assessment === "prolonged" ? "rb rb-red" : "rb";
    }},
    { key:"stemi_territory", label:"STEMI Territory", style: v => v && v !== "None" && v !== "Unable to assess" ? "rb rb-red" : "rb" },
    { key:"stemi_equivalents", label:"STEMI Equivalents", style: v => v && v !== "None" ? "rb rb-red" : null },
    { key:"reciprocal_changes", label:"Reciprocal Changes", style: v => v && v !== "None" ? "rb rb-amber" : null },
    { key:"conduction", label:"Conduction", style: v => {
      const d = typeof v === "object" ? v : {};
      const bad = (d.pr_abnormality && d.pr_abnormality !== "none") || (d.bbb && d.bbb !== "none");
      return bad ? "rb rb-amber" : "rb";
    }},
    { key:"ectopy", label:"Ectopy", style: v => {
      const d = typeof v === "object" ? v : {};
      return d.clinical_significance === "high risk" ? "rb rb-red" : d.pvcs && d.pvcs !== "none" ? "rb rb-amber" : null;
    }},
    { key:"additional_findings", label:"Additional Findings", style: () => "rb" },
    { key:"other_findings", label:"Other Findings", style: () => "rb" },
  ];

  return (
    <div>
      {isCrit && (
        <div className="alert-box alert-crit fu">
          <div className="alert-icon" style={{background:"#c0392b"}}>!</div>
          <div>
            <div style={{fontWeight:600,fontSize:13,color:"#c0392b",marginBottom:3}}>Critical Finding</div>
            <div style={{fontSize:12,color:"#7a1a1a",lineHeight:1.6}}>{f.critical_alert}</div>
          </div>
        </div>
      )}
      {!isCrit && f.interpretation && (
        <div className="alert-box alert-ok fu">
          <div className="alert-icon" style={{background:"#1a7a4a"}}>✓</div>
          <div>
            <div style={{fontWeight:600,fontSize:13,color:"#1a7a4a",marginBottom:3}}>Interpretation</div>
            <div style={{fontSize:12,color:"#1a3c2a",lineHeight:1.6}}>{f.interpretation}</div>
          </div>
        </div>
      )}

      <div style={{maxHeight:520,overflowY:"auto"}}>
        {sections.map(({key, label, style}) => {
          const v = f[key];
          if (v === null || v === undefined) return null;
          const displayVal = flattenVal(v);
          if (!displayVal) return null;
          const cls = typeof style === "function" ? style(v) : style;
          if (!cls) return null;
          return (
            <div key={key} className={cls}>
              <div className="rlbl">{label}</div>
              <div className="rtxt" style={{fontSize:12.5}}>{displayVal}</div>
            </div>
          );
        })}

        {f.differentials?.length > 0 && (
          <div className="rb rb-blue">
            <div className="rlbl">Differentials</div>
            <div className="rtxt">{Array.isArray(f.differentials) ? f.differentials.join(" · ") : f.differentials}</div>
          </div>
        )}
        {f.management && (
          <div className="rb rb-amber">
            <div className="rlbl">Management</div>
            <div className="rtxt">{f.management}</div>
          </div>
        )}
        {f.findings_limited_by_quality?.length > 0 && (
          <div className="rb" style={{opacity:0.65}}>
            <div className="rlbl">Limited by Image Quality</div>
            <div className="rtxt" style={{fontSize:11.5}}>{f.findings_limited_by_quality.join(" · ")}</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── ANALYZER ─────────────────────────────────────────────────
function Analyzer({ onExport }) {
  const [imgSrc, setImgSrc] = React.useState(null);
  const [imgFile, setImgFile] = React.useState(null);
  const [info, setInfo] = React.useState({age:"",sex:"M",complaint:"",context:""});
  const [report, setReport] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [saving, setSaving] = React.useState(false);
  const [saved, setSaved] = React.useState(false);
  const [verifyMode, setVerifyMode] = React.useState(false);
  const [correctDx, setCorrectDx] = React.useState("");
  const [category, setCategory] = React.useState("Rhythm disorders");
  const setI = (k,v) => setInfo(p=>({...p,[k]:v}));

  const handleFile = f => {
    setImgFile(f); setReport(null); setError(null); setSaved(false);
    const r = new FileReader(); r.onload = e => setImgSrc(e.target.result); r.readAsDataURL(f);
  };

  const analyze = async () => {
    if (!imgFile) return;
    setLoading(true); setReport(null); setError(null);
    try {
      const form = new FormData();
      form.append("image", imgFile);
      if (info.age) form.append("age", info.age);
      if (info.sex) form.append("sex", info.sex);
      if (info.complaint) form.append("complaint", info.complaint);
      if (info.context) form.append("context", info.context);
      const result = await api("/analyze", {method:"POST", body:form});
      setReport(result);
    } catch(e) { setError(e.message); }
    setLoading(false);
  };

  const saveToLibrary = async () => {
    if (!report) return;
    setSaving(true);
    try {
      await api(`/cases/${report.report_id}/verify`, {
        method:"POST",
        body: (() => { const f=new FormData(); f.append("correct_diagnosis", correctDx||report.ecg_findings?.interpretation||""); f.append("ai_was_correct", "true"); f.append("category", category); return f; })()
      });
      setSaved(true); setVerifyMode(false);
    } catch(e) { setError(e.message); }
    setSaving(false);
  };

  const f = report?.ecg_findings || {};
  const conf = confStr(report?.confidence);

  return (
    <div className="grid-2">
      <div>
        <div className="card">
          <div className="ch" style={{paddingBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div className="ct">ECG Upload & Analysis</div><div className="cs">Upload a real ECG photo for AI interpretation</div></div>
              {report && <span className={`badge ${f.critical_alert&&f.critical_alert!=="null"?"br":conf==="HIGH"?"bg":"ba"}`}>{conf} confidence</span>}
            </div>
          </div>
          <div className="cb" style={{paddingTop:0}}>
            <UploadZone imgSrc={imgSrc} onFile={handleFile} onClear={()=>{setImgSrc(null);setImgFile(null);setReport(null);setError(null);setSaved(false);}} />
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 70px 55px",gap:10,marginTop:12}}>
              <div><label className="lbl">Chief Complaint</label>
                <select className="inp" value={info.complaint} onChange={e=>setI("complaint",e.target.value)}>
                  <option value="">Select…</option>
                  {["Chest Pain","Palpitations","Syncope","Dyspnoea","Heart Failure","Pre-op","Cardiac Arrest","Dizziness","Shock","Routine"].map(c=><option key={c}>{c}</option>)}
                </select>
              </div>
              <div><label className="lbl">Clinical Context</label>
                <input className="inp" value={info.context} placeholder="Known HTN, DM…" onChange={e=>setI("context",e.target.value)}/>
              </div>

  const setF = (k,v) => setForm(p=>({...p,[k]:v}));

    setImgFile(f); setResult(null); setError(null);

// ─── ECG RECONSTRUCTION ENGINE ────────────────────────────────
// Classifies each lead based on AI findings and applies colour overlays
function classifyLead(leadName, digitized, analysis) {
  const f = analysis?.ecg_findings || {};
  const stemiTerritory = f.stemi_territory || "";
  const stemiEquiv = (f.stemi_equivalents || "").toLowerCase();
  const stSeg = f.st_segment || {};
  const tWaves = f.t_waves || {};
  const conduction = f.conduction || {};
  const ectopy = f.ectopy || {};
  const leadFindings = (digitized?.lead_findings || {})[leadName] || "";
  const lf = leadFindings.toLowerCase();

  // STEMI leads — red
  const stemiLeadMap = {
    "Anterior (LAD)": ["V1","V2","V3","V4"],
    "Septal": ["V1","V2"],
    "Lateral (LCx)": ["I","aVL","V5","V6"],
    "Inferior (RCA)": ["II","III","aVF"],
    "Anterolateral": ["I","aVL","V1","V2","V3","V4"],
    "Inferolateral": ["II","III","aVF","V5","V6"],
    "Posterior": ["V1","V2","V3"],
    "Right ventricular": ["V1"],
  };
  for (const [territory, leads] of Object.entries(stemiLeadMap)) {
    if (stemiTerritory.includes(territory) && leads.includes(leadName)) {
      return { color: "#c0392b", bg: "rgba(192,57,43,0.08)", label: "STEMI", severity: 4 };
    }
  }

  // STEMI equivalent leads
  if (stemiEquiv && stemiEquiv !== "none") {
    if ((stemiEquiv.includes("anterior") || stemiEquiv.includes("lad") || stemiEquiv.includes("hyperacute")) &&
        ["V1","V2","V3","V4"].includes(leadName)) {
      return { color: "#c0392b", bg: "rgba(192,57,43,0.08)", label: "STEMI equiv", severity: 4 };
    }
  }

  // Ischaemia / ST depression / T inversion — amber
  const stElevDesc = typeof stSeg === "object" ? (stSeg.elevation || "") : String(stSeg);
  const stDepDesc = typeof stSeg === "object" ? (stSeg.depression || "") : "";
  const tInvDesc = typeof tWaves === "object" ? (tWaves.inversions || "") : "";

  if (lf.includes("st elevation") || lf.includes("ste") || lf.includes("elevated st")) {
    return { color: "#c0392b", bg: "rgba(192,57,43,0.08)", label: "STE", severity: 3 };
  }
  if (lf.includes("st depression") || lf.includes("std") || lf.includes("depressed st") ||
      lf.includes("t wave inversion") || lf.includes("t inversion") || lf.includes("inverted t")) {
    return { color: "#d4820a", bg: "rgba(212,130,10,0.08)", label: "Ischaemia", severity: 2 };
  }
  if (lf.includes("hyperacute") || lf.includes("tall t") || lf.includes("peaked t")) {
    return { color: "#c0392b", bg: "rgba(192,57,43,0.08)", label: "Hyperacute T", severity: 3 };
  }

  // Conduction issues — blue
  const bbb = typeof conduction === "object" ? (conduction.bbb || "") : "";
  if (bbb && bbb !== "none") {
    if ((bbb.includes("LBBB") && ["I","aVL","V5","V6","V1"].includes(leadName)) ||
        (bbb.includes("RBBB") && ["V1","V2","I","V5","V6"].includes(leadName))) {
      return { color: "#1a5fa8", bg: "rgba(26,95,168,0.07)", label: bbb, severity: 2 };
    }
  }
  if (lf.includes("rbbb") || lf.includes("lbbb") || lf.includes("rsr") || lf.includes("wide qrs")) {
    return { color: "#1a5fa8", bg: "rgba(26,95,168,0.07)", label: "Conduction", severity: 2 };
  }

  // Normal — green border
  return { color: "#1a7a4a", bg: "rgba(26,122,74,0.04)", label: null, severity: 0 };
}

// Renders a single lead strip onto a canvas
function drawLeadStrip(canvas, signalData, opts = {}) {
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  const { bgColor = "#fffdf8", waveColor = "#1a1a2e", highlightBg = null } = opts;

  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = highlightBg || bgColor;
  ctx.fillRect(0, 0, W, H);

  // ECG paper grid
  const MINOR = "rgba(192,57,43,0.08)";
  const MAJOR = "rgba(192,57,43,0.18)";
  ctx.lineWidth = 0.4;
  ctx.strokeStyle = MINOR;
  for (let x = 0; x < W; x += 8) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 8) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  ctx.lineWidth = 0.7;
  ctx.strokeStyle = MAJOR;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  if (!signalData || signalData.length === 0) return;

  // Baseline
  ctx.strokeStyle = "rgba(192,57,43,0.15)";
  ctx.lineWidth = 0.5;
  ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(0, H/2); ctx.lineTo(W, H/2); ctx.stroke();
  ctx.setLineDash([]);

  // Draw waveform
  ctx.strokeStyle = waveColor;
  ctx.lineWidth = 1.4;
  ctx.lineJoin = "round";
  ctx.lineCap = "round";
  ctx.shadowColor = waveColor;
  ctx.shadowBlur = 1;
  ctx.beginPath();
  const mid = H / 2, amp = H * 0.38;
  signalData.forEach((v, i) => {
    const x = (i / signalData.length) * W;
    const y = mid - v * amp;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();
  ctx.shadowBlur = 0;
}

// Generates synthetic ECG waveform based on lead name and findings
function generateLeadWaveform(leadName, classification, params = {}) {
  const { hr = 75, beats = 3 } = params;
  const spb = Math.floor(500 * (60 / hr));
  const pts = [];
  const isSTE = classification.severity >= 3 && classification.label !== "Ischaemia";
  const isSTD = classification.label === "Ischaemia";
  const isBBB = classification.label && classification.label.includes("BB");

  // Lead-specific morphology adjustments
  const leadConfig = {
    "I":   { rAmp: 0.7,  pDir: 1,   tDir: 1,   qAmp: 0.05 },
    "II":  { rAmp: 1.0,  pDir: 1,   tDir: 1,   qAmp: 0.05 },
    "III": { rAmp: 0.5,  pDir: 0.5, tDir: 0.7, qAmp: 0.08 },
    "aVR": { rAmp: -0.8, pDir: -1,  tDir: -1,  qAmp: 0    },
    "aVL": { rAmp: 0.4,  pDir: 0.5, tDir: 0.6, qAmp: 0.05 },
    "aVF": { rAmp: 0.8,  pDir: 1,   tDir: 1,   qAmp: 0.08 },
    "V1":  { rAmp: 0.2,  pDir: 0.5, tDir: -0.5,qAmp: 0    },
    "V2":  { rAmp: 0.4,  pDir: 0.8, tDir: 0.3, qAmp: 0    },
    "V3":  { rAmp: 0.7,  pDir: 1,   tDir: 0.8, qAmp: 0    },
    "V4":  { rAmp: 1.1,  pDir: 1,   tDir: 1,   qAmp: 0    },
    "V5":  { rAmp: 1.0,  pDir: 1,   tDir: 1,   qAmp: 0.05 },
    "V6":  { rAmp: 0.85, pDir: 1,   tDir: 1,   qAmp: 0.08 },
  };
  const cfg = leadConfig[leadName] || { rAmp: 0.8, pDir: 1, tDir: 1, qAmp: 0.05 };

  for (let beat = 0; beat < beats; beat++) {
    for (let i = 0; i < spb; i++) {
      const ph = i / spb;
      let y = 0;

      // P wave
      if (ph > 0.06 && ph < 0.14)
        y = 0.12 * cfg.pDir * Math.sin(Math.PI * (ph - 0.06) / 0.08);

      // QRS
      if (!isBBB) {
        if (ph > 0.22 && ph < 0.245) y = -0.07 * Math.abs(cfg.rAmp) * Math.sin(Math.PI * (ph - 0.22) / 0.025);
        else if (ph > 0.245 && ph < 0.275) y = 1.05 * cfg.rAmp * Math.sin(Math.PI * (ph - 0.245) / 0.03);
        else if (ph > 0.275 && ph < 0.305) y = -0.15 * Math.abs(cfg.rAmp) * Math.sin(Math.PI * (ph - 0.275) / 0.03);
      } else {
        // LBBB-like broad complex
        if (ph > 0.22 && ph < 0.42) {
          const t = (ph - 0.22) / 0.20;
          y = t < 0.45 ? -0.2 * cfg.rAmp * Math.sin(Math.PI * t / 0.45)
                       : 0.95 * cfg.rAmp * Math.sin(Math.PI * (t - 0.45) / 0.55);
        }
      }

      // ST segment with elevation/depression
      if (ph > 0.31 && ph < 0.42) {
        if (isSTE) y = 0.25 * Math.abs(cfg.rAmp) * Math.sign(cfg.rAmp); // ST elevation
        else if (isSTD) y = -0.15 * Math.abs(cfg.rAmp); // ST depression
        else y = 0;
      }

      // T wave
      if (ph > 0.38 && ph < 0.60) {
        const tAmp = isSTE ? 0.45 : isSTD ? 0.1 : 0.3;
        y += tAmp * cfg.tDir * Math.sin(Math.PI * (ph - 0.38) / 0.22);
      }

      pts.push(y + 0.01 * (Math.random() - 0.5));
    }
  }
  return pts;
}

// ─── Reconstructed ECG Canvas Component ───────────────────────
function ReconstructedECG({ digitized, analysis, onCapture }) {
  const canvasRefs = React.useRef({});
  const rhythmRef = React.useRef(null);
  const containerRef = React.useRef(null);
  const [rendered, setRendered] = React.useState(false);

  const LEADS_LAYOUT = [
    ["I","aVR","V1","V4"],
    ["II","aVL","V2","V5"],
    ["III","aVF","V3","V6"],
  ];
  const ALL_LEADS = LEADS_LAYOUT.flat();
  const hr = digitized?.heart_rate_bpm || 75;
  const params = { hr, beats: 3 };

  // Classify all leads
  const classifications = {};
  ALL_LEADS.forEach(lead => {
    classifications[lead] = classifyLead(lead, digitized, analysis);
  });

  React.useEffect(() => {
    ALL_LEADS.forEach(lead => {
      const cv = canvasRefs.current[lead];
      if (!cv) return;
      const cls = classifications[lead];
      const signal = generateLeadWaveform(lead, cls, params);
      drawLeadStrip(cv, signal, {
        waveColor: cls.severity >= 3 ? "#9b1c1c" : cls.severity >= 2 ? "#92400e" : cls.label === null ? "#1a1a2e" : "#1e3a5f",
        highlightBg: cls.bg,
      });
    });

    // Rhythm strip — Lead II full width
    const rhythmCv = rhythmRef.current;
    if (rhythmCv) {
      const cls = classifications["II"];
      const signal = generateLeadWaveform("II", cls, { hr, beats: 6 });
      drawLeadStrip(rhythmCv, signal, {
        waveColor: cls.severity >= 3 ? "#9b1c1c" : "#1a1a2e",
        highlightBg: cls.bg,
      });
    }
    setRendered(true);
  }, [digitized, analysis]);

  // Capture canvas as image for PDF
  const captureECG = () => {
    if (!containerRef.current) return null;
    // Collect all canvases and stitch into one image
    const allCanvases = containerRef.current.querySelectorAll("canvas");
    if (allCanvases.length === 0) return null;
    const totalH = Array.from(allCanvases).reduce((sum, cv) => {
      const rect = cv.getBoundingClientRect();
      return Math.max(sum, cv.offsetTop + cv.height);
    }, 0);
    return containerRef.current;
  };

  const stemiLeads = ALL_LEADS.filter(l => classifications[l].severity >= 3);
  const ischaemiaLeads = ALL_LEADS.filter(l => classifications[l].severity === 2 && !classifications[l].label?.includes("BB"));
  const conductionLeads = ALL_LEADS.filter(l => classifications[l].label?.includes("BB") || classifications[l].label?.includes("Conduction"));
  const normalLeads = ALL_LEADS.filter(l => classifications[l].severity === 0);

  return (
    <div ref={containerRef}>
      {/* Legend */}
      <div style={{display:"flex",gap:12,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{fontSize:10,fontFamily:"'DM Mono',monospace",color:"#7a95a8",textTransform:"uppercase",letterSpacing:"0.08em"}}>Overlay Key:</div>
        {[
          {color:"#c0392b",bg:"rgba(192,57,43,0.1)",label:`STEMI / Equivalent (${stemiLeads.join(", ")||"none"})`},
          {color:"#d4820a",bg:"rgba(212,130,10,0.1)",label:`Ischaemia (${ischaemiaLeads.join(", ")||"none"})`},
          {color:"#1a5fa8",bg:"rgba(26,95,168,0.1)",label:`Conduction (${conductionLeads.join(", ")||"none"})`},
          {color:"#1a7a4a",bg:"rgba(26,122,74,0.06)",label:`Normal (${normalLeads.length} leads)`},
        ].map(({color,bg,label}) => (
          <div key={label} style={{display:"flex",alignItems:"center",gap:5,fontSize:11}}>
            <div style={{width:12,height:12,borderRadius:2,background:bg,border:`1.5px solid ${color}`}}/>
            <span style={{color:"#4a6277"}}>{label}</span>
          </div>
        ))}
      </div>

      {/* 12-lead grid */}
      <div style={{border:"1px solid rgba(192,57,43,0.2)",borderRadius:8,overflow:"hidden",background:"#fffdf8"}}>
        {LEADS_LAYOUT.map((row, ri) => (
          <div key={ri} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:1,background:"rgba(192,57,43,0.1)"}}>
            {row.map(lead => {
              const cls = classifications[lead];
              return (
                <div key={lead} style={{position:"relative",background:cls.bg||"#fffdf8"}}>
                  {/* Lead label */}
                  <div style={{
                    position:"absolute",top:4,left:6,zIndex:2,
                    fontFamily:"'DM Mono',monospace",fontSize:9,
                    fontWeight:700,color:cls.color,
                    textTransform:"uppercase",letterSpacing:"0.06em",
                    background:"rgba(255,253,248,0.85)",padding:"1px 4px",borderRadius:2
                  }}>{lead}</div>
                  {/* Severity badge */}
                  {cls.label && (
                    <div style={{
                      position:"absolute",top:4,right:4,zIndex:2,
                      fontFamily:"'DM Mono',monospace",fontSize:8,
                      background:cls.color,color:"#fff",
                      padding:"1px 5px",borderRadius:2,letterSpacing:"0.04em"
                    }}>{cls.label}</div>
                  )}
                  {/* Border highlight */}
                  <div style={{
                    position:"absolute",inset:0,
                    border:`2px solid ${cls.severity > 0 ? cls.color : "transparent"}`,
                    opacity: cls.severity > 0 ? 0.5 : 0,
                    pointerEvents:"none",zIndex:1
                  }}/>
                  <canvas
                    ref={el => canvasRefs.current[lead] = el}
                    width={900} height={80}
                    style={{width:"100%",height:80,display:"block"}}
                  />
                </div>
              );
            })}
          </div>
        ))}

        {/* Rhythm strip */}
        <div style={{position:"relative",background:classifications["II"].bg||"#fffdf8",borderTop:"1px solid rgba(192,57,43,0.1)"}}>
          <div style={{
            position:"absolute",top:4,left:6,zIndex:2,
            fontFamily:"'DM Mono',monospace",fontSize:9,fontWeight:700,
            color:classifications["II"].color,
            background:"rgba(255,253,248,0.85)",padding:"1px 4px",borderRadius:2
          }}>Lead II — Rhythm Strip</div>
          <canvas ref={rhythmRef} width={900} height={64}
            style={{width:"100%",height:64,display:"block"}}/>
        </div>
      </div>

      {/* ECG metadata footer */}
      <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:10,fontFamily:"'DM Mono',monospace",color:"#7a95a8"}}>
        <span>Speed: {digitized?.paper_speed||"25mm/s"} · Gain: {digitized?.calibration||"10mm/mV"} · Leads: {digitized?.leads_visible?.length||12}</span>
        <span>Visualization by CardioLens · {new Date().toLocaleDateString("en-GB")}</span>
      </div>
    </div>
  );
}

      <div class="section-title">Lead-by-Lead Findings</div>
      ${digitized?.lead_findings ? Object.entries(digitized.lead_findings).map(([lead, desc]) => `
        <div class="finding finding-normal">
          <div class="finding-label">${lead}</div>${desc}
        </div>`).join("") : "<p style='color:#7a95a8;font-size:10px'>No per-lead data extracted</p>"}
    </div>
  </div>

  <!-- Differentials + Management -->
  ${f.differentials?.length ? `
  <div class="section-title">Differential Diagnosis</div>
  <div class="finding finding-warning">${Array.isArray(f.differentials) ? f.differentials.join(" · ") : f.differentials}</div>` : ""}

  ${f.management ? `
  <div class="section-title">Management Recommendations</div>
  <div class="finding finding-normal">${f.management}</div>` : ""}

  <!-- Footer -->
  <div class="report-footer">
    <span>CardioLens ECG Platform · Educational Use Only · Not for Clinical Decision Making</span>
    <span>Report ${reportId} · Generated ${now}</span>
  </div>

</div>
<script>setTimeout(() => window.print(), 800);<\/script>
</body></html>`);
    w.document.close();
  };

  const steps = ["Upload","Grid Detection","Lead Isolation","Digitization","AI Report","Complete"];

  return (
    <div>
      {/* Step progress */}
      <div style={{display:"flex",alignItems:"flex-start",marginBottom:20}}>
        {steps.map((s,i) => (
          <div key={s} style={{display:"flex",alignItems:"center",flex:i<steps.length-1?"1":"none"}}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
              <div className={`step-circle ${step>i?"step-done":step===i?"step-active":"step-pending"}`}>
                {step>i?"✓":i+1}
              </div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:step>=i?"#0d1f35":"#7a95a8",textTransform:"uppercase",letterSpacing:"0.06em",whiteSpace:"nowrap",textAlign:"center"}}>{s}</div>
            </div>
            {i<steps.length-1&&<div className={`step-line ${step>i?"step-done-line":""}`} style={{marginBottom:18}}/>}
          </div>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"420px 1fr",gap:20,alignItems:"start"}}>
        {/* Left — upload + controls */}
        <div>
          <div className="card">
            <div className="ch"><div className="ct">Upload Paper ECG</div><div className="cs">Photo or scan · any 12-lead layout</div></div>
            <div className="cb">
              <UploadZone imgSrc={imgSrc} onFile={handleFile}
                onClear={()=>{setImgSrc(null);setImgFile(null);setStep(0);setDigitized(null);setAnalysis(null);}}
                label="Upload paper ECG for digitization"/>
              {imgFile && step===0 && (
                <button className="btn btn-n" style={{width:"100%",justifyContent:"center",marginTop:12}} onClick={digitize}>
                  🔬 Digitize + Reconstruct + Analyse
                </button>
              )}
              {step>0 && step<5 && (
                <div style={{marginTop:12,padding:"12px 14px",background:"#eef3fb",borderRadius:8,border:"1px solid #dde5ef"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                    <span className="spinner-dark"/>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#0d1f35"}}>
                      {["","Detecting paper grid…","Isolating leads…","Extracting waveform data…","Running AI analysis…"][step]}
                    </div>
                  </div>
                  <div style={{height:3,background:"#dde5ef",borderRadius:2}}>
                    <div style={{height:"100%",width:`${(step/5)*100}%`,background:"#0d1f35",borderRadius:2,transition:"width 0.5s ease"}}/>
                  </div>
                </div>
              )}
              {error && <div style={{marginTop:10,padding:"10px 12px",background:"#fdecea",borderRadius:7,border:"1px solid #c0392b",fontSize:12,color:"#c0392b"}}>{error}</div>}
            </div>
          </div>

          {/* Measurements card */}
          {digitized && (
            <div className="card fu">
              <div className="ch"><div className="ct" style={{fontSize:14}}>Digitized Measurements</div></div>
              <div className="cb">
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
                  {[
                    ["Heart Rate", digitized.heart_rate_bpm ? `${digitized.heart_rate_bpm} bpm` : "—"],
                    ["RR Interval", digitized.rr_interval_ms ? `${digitized.rr_interval_ms} ms` : "—"],
                    ["PR Interval", digitized.pr_interval_ms ? `${digitized.pr_interval_ms} ms` : "—"],
                    ["QRS Duration", digitized.qrs_duration_ms ? `${digitized.qrs_duration_ms} ms` : "—"],
                    ["QTc", digitized.qtc_ms ? `${digitized.qtc_ms} ms` : "—"],
                    ["QRS Axis", digitized.qrs_axis !== null && digitized.qrs_axis !== undefined ? `${digitized.qrs_axis}°` : "—"],
                    ["Paper Speed", digitized.paper_speed || "—"],
                    ["Calibration", digitized.calibration || "—"],
                  ].map(([k,v]) => (
                    <div key={k} style={{background:"#f0f4f8",borderRadius:7,padding:"9px 11px"}}>
                      <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"#7a95a8",textTransform:"uppercase",letterSpacing:"0.06em"}}>{k}</div>
                      <div style={{fontFamily:"'Fraunces',serif",fontSize:18,fontWeight:500,color:"#0d1f35",marginTop:2}}>{v}</div>
                    </div>
                  ))}
                </div>
                {/* Per-lead findings */}
                {digitized.lead_findings && (
                  <div>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"#7a95a8",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>Lead-by-Lead</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                      {Object.entries(digitized.lead_findings).map(([lead,desc]) => (
                        <div key={lead} style={{background:"#f7f9fc",border:`1.5px solid ${classifyLead(lead,digitized,analysis).color}30`,borderRadius:5,padding:"6px 8px"}}>
                          <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:classifyLead(lead,digitized,analysis).color,fontWeight:700,marginBottom:2}}>{lead}</div>
                          <div style={{fontSize:11,color:"#4a6277",lineHeight:1.5}}>{desc}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* Pipeline explanation */}
          {!digitized && (
            <div className="card">
              <div className="ch"><div className="ct" style={{fontSize:14}}>Digitization Pipeline</div></div>
              <div className="cb">
                {[
                  {icon:"🔍",t:"Grid Detection",d:"Detects ECG paper grid to calibrate 25mm/s and 10mm/mV scale"},
                  {icon:"✂️",t:"Lead Isolation",d:"Segments 4×3 layout into individual lead regions"},
                  {icon:"〰️",t:"Waveform Extraction",d:"Claude Vision extracts per-lead measurements and morphology"},
                  {icon:"🎨",t:"ECG Reconstruction",d:"Renders clean annotated 12-lead with colour-coded highlights"},
                  {icon:"🤖",t:"AI Classification",d:"Full systematic clinical interpretation using 8-phase protocol"},
                ].map(({icon,t,d}) => (
                  <div key={t} style={{display:"flex",gap:10,padding:"8px 0",borderBottom:"1px solid #f0f4f8"}}>
                    <span style={{fontSize:18,flexShrink:0}}>{icon}</span>
                    <div><div style={{fontWeight:500,fontSize:13}}>{t}</div><div style={{fontSize:11,color:"#7a95a8",marginTop:1}}>{d}</div></div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* Right — ECG reconstruction + analysis */}
        <div>
          {step === 5 && digitized && (
            <div className="fu">
              {/* Tab bar */}
              <div className="tab-bar">
                {[["original","Original Photo"],["reconstruction","12-Lead Reconstruction"],["analysis","Clinical Report"]].map(([id,lbl]) => (
                  <div key={id} className={`tab ${activeTab===id?"active":""}`} onClick={()=>setActiveTab(id)}>{lbl}</div>
                ))}
                <button className="btn btn-g btn-sm" style={{marginLeft:"auto",alignSelf:"center"}} onClick={printReport}>
                  📄 Export A4 PDF Report
                </button>
              </div>

              {activeTab === "original" && imgSrc && (
                <div className="card">
                  <div className="cb">
                    <img src={imgSrc} alt="Original ECG" style={{width:"100%",borderRadius:7,border:"1px solid #dde5ef"}}/>
                    <div style={{fontSize:10,fontFamily:"'DM Mono',monospace",color:"#7a95a8",marginTop:8,textAlign:"center"}}>Original uploaded ECG image</div>
                  </div>
                </div>
              )}

              {activeTab === "reconstruction" && (
                <div className="card" ref={reportRef}>
                  <div className="ch">
                    <div className="ct">Digital Reconstruction</div>
                    <div className="cs">Clean 12-lead ECG with colour-coded abnormality overlays</div>
                  </div>
                  <div className="cb">
                    <ReconstructedECG digitized={digitized} analysis={analysis}/>
                  </div>
                </div>
              )}

              {activeTab === "analysis" && analysis && (
                <div className="card">
                  <div className="ch">
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div><div className="ct">Clinical Interpretation</div><div className="cs">8-phase systematic analysis</div></div>
                      <span className={`badge ${analysis.ecg_findings?.image_quality==="GOOD"?"bg":analysis.ecg_findings?.image_quality==="POOR"?"br":"ba"}`}>
                        {analysis.ecg_findings?.image_quality} quality
                      </span>
                    </div>
                  </div>
                  <div className="cb">
                    <FindingsPanel findings={analysis.ecg_findings} confidence={analysis.ecg_findings?.confidence} imageQuality={analysis.ecg_findings?.image_quality}/>
                  </div>
                </div>
              )}
            </div>
          )}

          {step === 0 && !digitized && (
            <div className="card" style={{textAlign:"center",padding:"60px 20px"}}>
              <div style={{fontSize:36,marginBottom:14}}>📡</div>
              <div style={{fontFamily:"'Fraunces',serif",fontSize:19,fontWeight:500,marginBottom:8}}>ECG Digitizer</div>
              <div style={{fontSize:13,color:"#7a95a8",lineHeight:1.8}}>
                Upload a paper ECG photo.<br/>
                The system will extract measurements,<br/>
                reconstruct a clean 12-lead with<br/>
                <strong style={{color:"#0d1f35"}}>colour-coded abnormality overlays</strong>,<br/>
                and generate a full clinical report<br/>
                exportable as an <strong style={{color:"#0d1f35"}}>A4 PDF</strong>.
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}


// ─── TRAINING DASHBOARD ────────────────────────────────────────
function TrainingDashboard() {
  const [stats, setStats] = React.useState(null);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(()=>{
    api("/training/stats").then(setStats).catch(()=>{}).finally(()=>setLoading(false));
  }, []);

  if (loading) return <div style={{textAlign:"center",padding:"40px",color:"#7a95a8"}}><span className="spinner-dark"/> Loading…</div>;
  if (!stats) return <div style={{textAlign:"center",padding:"40px",color:"#7a95a8"}}>Could not load training stats.</div>;

  const milestones = [50,200,500,2000,10000];
  const phases = [
    {milestone:50,title:"Phase 1 — Demo Ready",desc:"Show AI improving to colleagues and potential investors",achieved:stats.total>=50},
    {milestone:200,title:"Phase 2 — Clinical Validation",desc:"Present to cardiologists for expert feedback and validation",achieved:stats.total>=200},
    {milestone:500,title:"Phase 3 — Train First ML Model",desc:"Run PyTorch ResNet training on Google Colab. Produce specialist model.",achieved:stats.total>=500},
    {milestone:2000,title:"Phase 4 — Junior Cardiologist Accuracy",desc:"Model accuracy comparable to a cardiology trainee",achieved:stats.total>=2000},
    {milestone:10000,title:"Phase 5 — Publication Grade",desc:"Publishable accuracy data. Fundable. App Store ready.",achieved:stats.total>=10000},
  ];

  return (
    <div>
      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
        {[
          {n:stats.total,l:"Training Samples"},
          {n:stats.verified_cases||0,l:"Verified Cases"},
          {n:stats.ai_accuracy||"N/A",l:"AI Accuracy"},
          {n:stats.ready_for_training?"Ready":"Not yet",l:"ML Training"},
        ].map(({n,l})=>(
          <div key={l} className="stat-box">
            <div className="stat-num" style={{fontSize:n===String(n)&&n.length>5?20:32}}>{n}</div>
            <div className="stat-lbl">{l}</div>
          </div>
        ))}
      </div>

      {/* Progress bar */}
      <div className="card" style={{marginBottom:18}}>
        <div className="cb">
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <div style={{fontWeight:500,fontSize:14}}>Overall Progress</div>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:"#7a95a8"}}>{stats.total} / {stats.next_milestone} cases</div>
          </div>
          <div className="progress-bar"><div className="progress-fill" style={{width:`${stats.progress_pct||0}%`}}/></div>
          <div style={{fontSize:12,color:"#7a95a8",marginTop:5}}>{stats.next_milestone_label}</div>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18}}>
        {/* Milestones */}
        <div>
          <div className="card">
            <div className="ch"><div className="ct">Training Roadmap</div></div>
            <div className="cb">
              {phases.map((p,i)=>(
                <div key={p.milestone} style={{display:"flex",gap:12,padding:"12px 0",borderBottom:i<phases.length-1?"1px solid #f0f4f8":"none"}}>
                  <div style={{width:32,height:32,borderRadius:"50%",background:p.achieved?"#1a7a4a":"#eef2f7",color:p.achieved?"#fff":"#7a95a8",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0}}>
                    {p.achieved?"✓":p.milestone>=1000?`${p.milestone/1000}k`:p.milestone}
                  </div>
                  <div>
                    <div style={{fontWeight:500,fontSize:13,color:p.achieved?"#1a7a4a":"#1a2b3c"}}>{p.title}</div>
                    <div style={{fontSize:11,color:"#7a95a8",marginTop:2,lineHeight:1.5}}>{p.desc}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* By category + next steps */}
        <div>
          {stats.by_category && Object.keys(stats.by_category).length > 0 && (
            <div className="card" style={{marginBottom:14}}>
              <div className="ch"><div className="ct" style={{fontSize:14}}>Dataset by Category</div></div>
              <div className="cb">
                {Object.entries(stats.by_category).sort((a,b)=>b[1]-a[1]).map(([cat,count])=>(
                  <div key={cat} style={{marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
                      <span style={{color:"#1a2b3c"}}>{cat}</span>
                      <span style={{fontFamily:"'DM Mono',monospace",color:"#7a95a8"}}>{count}</span>
                    </div>
                    <div className="progress-bar"><div className="progress-fill" style={{width:`${Math.min(100,(count/Math.max(...Object.values(stats.by_category)))*100)}%`}}/></div>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div className="card" style={{background:"#0d1f35",border:"none"}}>
            <div className="cb">
              <div style={{fontFamily:"'Fraunces',serif",fontSize:15,fontWeight:500,color:"#fff",marginBottom:10}}>When You Hit 500 Cases</div>
              <div style={{fontSize:12,color:"rgba(255,255,255,0.65)",lineHeight:1.8}}>
                1. Export training data from <span style={{fontFamily:"'DM Mono',monospace",color:"#10b981"}}>/training/export</span><br/>
                2. Open Google Colab (free GPU)<br/>
                3. Upload <span style={{fontFamily:"'DM Mono',monospace",color:"#10b981"}}>train_ecg_model.py</span> from ROADMAP<br/>
                4. Run training (~2-3 hours)<br/>
                5. Download <span style={{fontFamily:"'DM Mono',monospace",color:"#10b981"}}>ecg_model.pth</span><br/>
                6. Upload to Railway → instant specialist model
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

        {isCrit && <div style={{background:"#fdecea",border:"2px solid #c0392b",borderRadius:8,padding:"12px 16px",marginBottom:16}}><div style={{fontWeight:700,color:"#c0392b",marginBottom:3}}>⚠ CRITICAL</div><div style={{fontSize:12,color:"#7a1a1a"}}>{f.critical_alert}</div></div>}
        {f.interpretation && <><div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"#0d1f35",textTransform:"uppercase",letterSpacing:"0.1em",borderBottom:"1px solid #dde5ef",paddingBottom:4,margin:"14px 0 8px"}}>Interpretation</div><div style={{fontSize:13,padding:"7px 11px",background:"#eef3fb",borderLeft:"3px solid #0d1f35",fontWeight:600,borderRadius:"0 4px 4px 0",marginBottom:5}}>{f.interpretation}</div></>}
        {imgSrc && <><div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"#0d1f35",textTransform:"uppercase",letterSpacing:"0.1em",borderBottom:"1px solid #dde5ef",paddingBottom:4,margin:"14px 0 8px"}}>Original ECG</div><img src={imgSrc} alt="ECG" style={{width:"100%",maxHeight:220,objectFit:"contain",marginBottom:12,borderRadius:6,border:"1px solid #dde5ef"}}/></>}
        {f.management && <><div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"#0d1f35",textTransform:"uppercase",letterSpacing:"0.1em",borderBottom:"1px solid #dde5ef",paddingBottom:4,margin:"14px 0 8px"}}>Management</div><div style={{fontSize:12,padding:"7px 11px",background:"#fef9ec",borderLeft:"3px solid #d4820a",borderRadius:"0 4px 4px 0"}}>{f.management}</div></>}
        <div style={{marginTop:20,paddingTop:12,borderTop:"1px solid #dde5ef",display:"flex",justifyContent:"space-between",fontFamily:"'DM Mono',monospace",fontSize:9,color:"#7a95a8"}}>
          <span>CardioLens · Educational Use Only · Not for Clinical Decision Making</span>
          <span>Generated {now} · Report {report.report_id}</span>
        </div>
      </div>
    </div>
  );
}

// ─── APP SHELL ─────────────────────────────────────────────────
const NAV = [
  {id:"analyzer",icon:"🔬",label:"ECG Analyzer",group:"Clinical"},
  {id:"digitizer",icon:"📡",label:"ECG Digitizer",group:"Clinical"},
  {id:"library",icon:"🗂",label:"ECG Library",group:"Dataset"},
  {id:"builder",icon:"💾",label:"Case Builder",group:"Dataset"},
  {id:"training",icon:"🧠",label:"Training Dashboard",group:"Dataset"},
];

const TITLES = {analyzer:"ECG Analyzer",digitizer:"ECG Digitizer",library:"ECG Library",builder:"Case Builder",training:"Training Dashboard",pdf:"PDF Report"};
const SUBS = {
  analyzer:"Upload a real ECG photo — Claude Vision reads and interprets it",
  digitizer:"Convert a paper ECG strip into structured digital measurements",
  library:"Browse, search and manage your entire ECG case library",
  builder:"Add verified ECG cases to build your training dataset",
  training:"Track your dataset growth toward ML model training",
};

function App() {
  const [active, setActive] = React.useState("analyzer");
  const [pdfData, setPdfData] = React.useState(null);
  const [backendOk, setBackendOk] = React.useState(null);

  React.useEffect(()=>{
    fetch(`${BACKEND}/health`).then(r=>r.ok?setBackendOk(true):setBackendOk(false)).catch(()=>setBackendOk(false));
  },[]);

  const groups = [...new Set(NAV.map(n=>n.group))];
  const page = pdfData ? "pdf" : active;

  return (
    <div className="shell">
      <aside className="sidebar">
        <div className="sb-logo">
          <div className="sb-icon">🫀</div>
          <div><div className="sb-title">CardioLens</div><div className="sb-sub">ECG Platform v2</div></div>
        </div>
        <nav className="sb-nav">
          {groups.map(g=>(
            <div key={g}>
              <div className="sb-grp">{g}</div>
              {NAV.filter(n=>n.group===g).map(n=>(
                <button key={n.id} className={`sb-btn ${active===n.id&&!pdfData?"active":""}`} onClick={()=>{setActive(n.id);setPdfData(null);}}>
                  <span style={{fontSize:14,width:18,textAlign:"center",flexShrink:0}}>{n.icon}</span>{n.label}
                </button>
              ))}
            </div>
          ))}
        </nav>
        <div className="sb-foot">
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <div className={`ldot ${backendOk===false?"off":""}`}/>
            <div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"rgba(255,255,255,0.5)"}}>
                {backendOk===null?"CHECKING…":backendOk?"BACKEND ONLINE":"BACKEND OFFLINE"}
              </div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:"rgba(255,255,255,0.3)",marginTop:1}}>claude-opus-4-5 · vision</div>
            </div>
          </div>
          <div style={{fontSize:9,color:"rgba(255,255,255,0.2)",fontFamily:"'DM Mono',monospace",lineHeight:1.55}}>Educational use only.</div>
        </div>
      </aside>

      <div className="main">
        <header className="topbar">
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#7a95a8",display:"flex",alignItems:"center",gap:5}}>
            <span>CardioLens</span><span style={{color:"#dde5ef"}}>›</span>
            <span style={{color:"#1a2b3c",fontWeight:500}}>{TITLES[page]}</span>
          </div>
          <div style={{flex:1}}/>
          <span style={{fontSize:10,color:"#7a95a8",fontFamily:"'DM Mono',monospace"}}>Beta v2.0</span>
          <div style={{width:1,height:14,background:"#dde5ef",margin:"0 8px"}}/>
          <button className="btn btn-r btn-sm" onClick={()=>{setActive("analyzer");setPdfData(null);}}>+ New Case</button>
        </header>

        <div className="body">
          {!pdfData && <div style={{marginBottom:18}}><div className="page-title">{TITLES[active]}</div><div className="page-sub">{SUBS[active]}</div></div>}
          <div className="fu" key={pdfData?"pdf":active}>
            {pdfData ? <PDFExport data={pdfData} onBack={()=>setPdfData(null)}/>
              : active==="analyzer" ? <Analyzer onExport={d=>setPdfData(d)}/>
              : active==="digitizer" ? <Digitizer/>
              : active==="library" ? <Library/>
              : active==="builder" ? <CaseBuilder/>
              : <TrainingDashboard/>}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
